backend:
  name: github
  repo: retroalliancemx/retroalliance-web
  branch: main

media_folder: "imagenes"
public_folder: "/imagenes"

locale: "es"

collections:
  - name: "eventos"
    label: "Eventos"
    label_singular: "Evento"
    folder: "eventos"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre del artista", name: "artista", widget: "string" }
      - { label: "Nombre del evento", name: "titulo", widget: "string" }
      - { label: "Descripción", name: "descripcion", widget: "text" }
      - { label: "Fecha y hora", name: "fecha", widget: "datetime", format: "YYYY-MM-DD HH:mm", date_format: "DD/MM/YYYY", time_format: "HH:mm" }
      - { label: "Venue / Lugar", name: "venue", widget: "string" }
      - { label: "Ciudad", name: "ciudad", widget: "string", default: "Guadalajara, Jalisco" }
      - { label: "Imagen del evento", name: "imagen", widget: "image", required: false }
      - { label: "Link para comprar boletos", name: "link_boletos", widget: "string", required: false }
      - label: "Tipos de boletos"
        name: "boletos"
        widget: "list"
        fields:
          - { label: "Tipo", name: "tipo", widget: "string" }
          - { label: "Precio (MXN)", name: "precio", widget: "number" }
          - { label: "Disponible", name: "disponible", widget: "boolean", default: true }
      - label: "Estado"
        name: "estado"
        widget: "select"
        options:
          - { label: "Próximamente", value: "proximo" }
          - { label: "Boletos disponibles", value: "disponible" }
          - { label: "Agotado", value: "agotado" }
          - { label: "Cancelado", value: "cancelado" }
        default: "proximo"
